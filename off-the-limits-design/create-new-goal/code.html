<body class="bg-background min-h-screen font-body-md text-on-background selection:bg-primary-fixed selection:text-on-primary-fixed">
<!-- Header / TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-background/80 border-b border-outline-variant/30 backdrop-blur-xl">
<div class="flex justify-between items-center px-container-margin py-xs max-w-7xl mx-auto">
<div class="flex items-center gap-sm">
<button class="p-xs active:scale-95 transition-transform" onclick="history.back()">
<span class="material-symbols-outlined text-primary">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md-mobile md:text-headline-md text-primary">OFF THE LIMITS</h1>
</div>
<div class="flex gap-sm">
<!-- No other actions as requested -->
</div>
</div>
</header>
<!-- Main Content Canvas -->
<main class="pt-24 pb-32 px-container-margin max-w-lg mx-auto min-h-screen relative overflow-hidden">
<!-- Subtle Atmospheric Background -->
<div class="absolute -top-24 -left-24 w-64 h-64 bg-primary-container/10 rounded-full blur-[100px] pointer-events-none"></div>
<div class="absolute bottom-24 -right-24 w-80 h-80 bg-secondary-container/5 rounded-full blur-[120px] pointer-events-none"></div>
<section class="relative z-10 space-y-lg">
<!-- Hero Graphic (Glassmorphism Context) -->
<div class="glass-card rounded-xl p-lg flex items-center justify-center overflow-hidden h-40">
<div class="text-center">
<div class="w-16 h-16 bg-primary-container/20 rounded-full flex items-center justify-center mx-auto mb-sm" id="selected-icon-preview">
<span class="material-symbols-outlined text-primary-fixed-dim text-[32px]">fitness_center</span>
</div>
<p class="font-label-caps text-label-caps text-on-surface-variant">NEW MILESTONE</p>
</div>
</div>
<!-- Form Section -->
<form class="space-y-md" id="goal-form">
<!-- Goal Name -->
<div class="space-y-base">
<label class="font-label-caps text-label-caps text-primary-fixed-dim ml-base">GOAL NAME</label>
<div class="bg-surface-container-low border border-outline-variant/30 rounded-lg p-sm transition-all focus-within:border-primary-fixed-dim group">
<input class="bg-transparent border-none w-full outline-none text-on-surface placeholder:text-on-surface-variant/40 font-title-sm text-title-sm" placeholder="e.g., Bench Press Max" type="text">
</div>
</div>
<!-- Icons Selector -->
<div class="space-y-base">
<label class="font-label-caps text-label-caps text-primary-fixed-dim ml-base">IDENTIFIER ICON</label>
<div class="flex gap-sm overflow-x-auto py-xs custom-scrollbar">
<button class="icon-choice min-w-[56px] h-14 bg-surface-container-high rounded-xl flex items-center justify-center border border-primary-fixed-dim/40 ring-2 ring-primary-fixed-dim" onclick="selectIcon('fitness_center')" type="button">
<span class="material-symbols-outlined">fitness_center</span>
</button>
<button class="icon-choice min-w-[56px] h-14 bg-surface-container-low rounded-xl flex items-center justify-center border border-outline-variant/20" onclick="selectIcon('directions_run')" type="button">
<span class="material-symbols-outlined">directions_run</span>
</button>
<button class="icon-choice min-w-[56px] h-14 bg-surface-container-low rounded-xl flex items-center justify-center border border-outline-variant/20" onclick="selectIcon('sprint')" type="button">
<span class="material-symbols-outlined">sprint</span>
</button>
<button class="icon-choice min-w-[56px] h-14 bg-surface-container-low rounded-xl flex items-center justify-center border border-outline-variant/20" onclick="selectIcon('timer')" type="button">
<span class="material-symbols-outlined">timer</span>
</button>
<button class="icon-choice min-w-[56px] h-14 bg-surface-container-low rounded-xl flex items-center justify-center border border-outline-variant/20" onclick="selectIcon('monitoring')" type="button">
<span class="material-symbols-outlined">monitoring</span>
</button>
<button class="icon-choice min-w-[56px] h-14 bg-surface-container-low rounded-xl flex items-center justify-center border border-outline-variant/20" onclick="selectIcon('water_drop')" type="button">
<span class="material-symbols-outlined">water_drop</span>
</button>
</div>
</div>
<!-- Split Row for Target and Unit -->
<div class="grid grid-cols-2 gap-md">
<div class="space-y-base">
<label class="font-label-caps text-label-caps text-primary-fixed-dim ml-base">FINAL GOAL</label>
<div class="bg-surface-container-low border border-outline-variant/30 rounded-lg p-sm focus-within:border-primary-fixed-dim">
<input class="bg-transparent border-none w-full outline-none text-on-surface font-data-metric text-data-metric h-10" type="number" value="0">
</div>
</div>
<div class="space-y-base">
<label class="font-label-caps text-label-caps text-primary-fixed-dim ml-base">UNIT</label>
<div class="bg-surface-container-low border border-outline-variant/30 rounded-lg p-sm focus-within:border-primary-fixed-dim relative">
<select class="bg-transparent border-none w-full outline-none text-on-surface font-title-sm text-title-sm appearance-none pr-8">
<option class="bg-surface-container-high" value="reps">reps</option>
<option class="bg-surface-container-high" value="sets">sets</option>
<option class="bg-surface-container-high" value="lbs">lbs</option>
<option class="bg-surface-container-high" value="kg">kg</option>
<option class="bg-surface-container-high" value="km">km</option>
<option class="bg-surface-container-high" value="min">min</option>
</select>
<span class="material-symbols-outlined absolute right-sm top-1/2 -translate-y-1/2 pointer-events-none text-on-surface-variant">expand_more</span>
</div>
</div>
</div>
<!-- Frequency Selection -->

</form>
<!-- Bottom Floating Action -->
<div class="pt-xl">
<button class="w-full bg-primary-fixed text-on-primary-fixed font-headline-md text-headline-md-mobile py-md rounded-xl neon-glow-btn active:scale-95 transition-all flex items-center justify-center gap-sm" id="submit-goal">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">add_circle</span>
                    Create Goal
                </button>
<p class="text-center text-on-surface-variant/60 font-label-caps text-[10px] mt-md uppercase tracking-widest">Precision Engineered for Performance</p>
</div>
</section>
</main>
<!-- Bottom Navigation Bar (Hidden on Desktop) -->
<nav class="md:hidden fixed bottom-0 w-full z-50 rounded-t-xl border-t border-outline-variant/20 backdrop-blur-md bg-surface-container-low/90 shadow-lg">
<div class="flex justify-around items-center h-xl px-xs pb-safe w-full max-w-7xl mx-auto">
<a class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary transition-colors active:scale-90 duration-200" href="#">
<span class="material-symbols-outlined">speed</span>
<span class="font-label-caps text-[10px] mt-1">Dashboard</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary transition-colors active:scale-90 duration-200" href="#">
<span class="material-symbols-outlined">leaderboard</span>
<span class="font-label-caps text-[10px] mt-1">Analytic</span>
</a>
<a class="flex flex-col items-center justify-center text-primary-fixed bg-primary-container/10 rounded-xl px-sm py-xs active:scale-90 transition-all duration-200" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">add_circle</span>
<span class="font-label-caps text-[10px] mt-1">Add</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary transition-colors active:scale-90 duration-200" href="#">
<span class="material-symbols-outlined">history</span>
<span class="font-label-caps text-[10px] mt-1">History</span>
</a>
</div>
</nav>
<script>
        function selectIcon(iconName) {
            // Update preview icon
            const preview = document.getElementById('selected-icon-preview');
            const previewSpan = preview.querySelector('span');
            previewSpan.textContent = iconName;
            
            // Add animation feedback
            preview.classList.add('scale-110');
            setTimeout(() => preview.classList.remove('scale-110'), 200);

            // Update button styles
            const buttons = document.querySelectorAll('.icon-choice');
            buttons.forEach(btn => {
                const btnIcon = btn.querySelector('span').textContent;
                if (btnIcon === iconName) {
                    btn.classList.add('bg-surface-container-high', 'border-primary-fixed-dim/40', 'ring-2', 'ring-primary-fixed-dim');
                    btn.classList.remove('bg-surface-container-low', 'border-outline-variant/20');
                } else {
                    btn.classList.remove('bg-surface-container-high', 'border-primary-fixed-dim/40', 'ring-2', 'ring-primary-fixed-dim');
                    btn.classList.add('bg-surface-container-low', 'border-outline-variant/20');
                }
            });
        }

        // Micro-interaction for submit button
        const submitBtn = document.getElementById('submit-goal');
        submitBtn.addEventListener('click', (e) => {
            e.preventDefault();
            submitBtn.innerHTML = '<span class="material-symbols-outlined animate-spin">progress_activity</span> Processing...';
            
            setTimeout(() => {
                submitBtn.innerHTML = '<span class="material-symbols-outlined">check_circle</span> Goal Created';
                submitBtn.classList.remove('bg-primary-fixed');
                submitBtn.classList.add('bg-secondary-container', 'text-white');
                
                setTimeout(() => {
                    // Simulation of navigation back or to dashboard
                    location.reload(); 
                }, 1000);
            }, 800);
        });

        // Simple frequency switcher
        const frequencyBtns = document.querySelectorAll('.frequency-btn');
        frequencyBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                frequencyBtns.forEach(b => {
                    b.classList.replace('bg-primary-container/10', 'bg-surface-container-low');
                    b.classList.replace('text-primary-fixed-dim', 'text-on-surface-variant');
                    b.classList.replace('border-primary-fixed-dim', 'border-outline-variant/30');
                });
                btn.classList.replace('bg-surface-container-low', 'bg-primary-container/10');
                btn.classList.replace('text-on-surface-variant', 'text-primary-fixed-dim');
                btn.classList.replace('border-outline-variant/30', 'border-primary-fixed-dim');
            });
        });
    </script>


</body></html>
